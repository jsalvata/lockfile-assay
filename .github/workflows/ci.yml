name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test:unit
      - name: CLI smoke test
        run: |
          node dist/cli.js --help | grep -q check
  integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pnpm-fixture: ['9.12.0', '10.34.1']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:integration
        env:
          PNPM_FIXTURE_VERSION: ${{ matrix.pnpm-fixture }}
  # Dogfood: assay THIS PR's lockfile with THIS PR's own code — the code under
  # review checking itself. Deliberately token-less: a `pull_request` job holds
  # no App credentials, so the memo is disabled and this always derives live. It
  # is NOT the gate; the anchored gate (published assay + memo, App-posted
  # verdict) is .github/workflows/lockfile-assay.yml on pull_request_target.
  # NB `pnpm exec lockfile-assay` does not work in this repo — pnpm does not
  # self-link a package's own bin — so run the built CLI directly.
  dogfood:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: fetch the base branch so --base resolves
        run: git fetch origin "${{ github.base_ref }}"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: assay this PR with the code under review
        run: node dist/cli.js check --base "origin/${{ github.base_ref }}" --head HEAD --json
  # waiver-stamp: the unprivileged producer (docs/auto-approval-setup.md step 1).
  # It computes the waiver verdict over the PR's commit range and publishes it as
  # the "waiver-stamp" check plus a report artifact. The privileged reviewer that
  # consumes that artifact is .github/workflows/waiver-stamp-review.yml — this job
  # never holds a write token, so it is no more trusted than any other PR CI job.
  waiver-stamp:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required: waiver-stamp walks the full base..head commit range
          persist-credentials: false
      - name: waiver-stamp
        uses: jsalvata/waiver-stamp/.github/actions/waiver-stamp@58d9247fcde0ff0b17e30b05959d7d9b3b85974d  # v1.11.1
        with:
          # Pinning `uses:` to a SHA pins the action's shell script but NOT, at this
          # release, the CLI that computes the verdict: v1.11.1's action.yml defaults
          # `waiver-version` to `latest`, so the tool whose judgment removes human
          # review would float with whatever npm last published. Naming the version
          # here closes that. waiver-stamp#32 makes the default self-pinning (it reads
          # the version from the action's own checkout at the ref you pinned); once we
          # bump the SHA above to a release carrying that fix, this `with:` block can
          # be deleted and the single SHA pin will cover both action and tool.
          waiver-version: 1.11.1

  # Release runs only AFTER test + integration pass, and only on a push to main
  # — never in parallel with the tests. Publishing to npm uses OIDC trusted
  # publishing (no NPM_TOKEN); configure the trusted publisher for this package
  # on npmjs.com pointing at this workflow file (see docs/RELEASING.md).
  release:
    needs: [test, integration]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
