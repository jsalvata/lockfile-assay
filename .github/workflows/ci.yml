# Third-party actions are pinned by commit SHA, not by tag: a tag is mutable and
# can be repointed at new code, so `@v4` is a range, not a pin — precisely the
# trust this tool exists to refuse elsewhere. The `release` job below holds
# `contents: write` and an npm OIDC identity, so an action swapped under a moved
# tag would run with them. The trailing `# vX.Y.Z` is what Dependabot reads to
# offer bumps; keep it in sync with the SHA. Guarded by src/workflow-pins.test.ts.
name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test:unit
      - name: CLI smoke test
        run: |
          node dist/cli.js --help | grep -q check
  integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pnpm-fixture: ['9.12.0', '10.34.1']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:integration
        env:
          PNPM_FIXTURE_VERSION: ${{ matrix.pnpm-fixture }}
  # Dogfood: assay THIS PR's lockfile with THIS PR's own code — the code under
  # review checking itself. Deliberately token-less: a `pull_request` job holds
  # no App credentials, so the memo is disabled and this always derives live. It
  # is NOT the gate; the anchored gate (published assay + memo, App-posted
  # verdict) is .github/workflows/lockfile-assay.yml on pull_request_target.
  # NB `pnpm exec lockfile-assay` does not work in this repo — pnpm does not
  # self-link a package's own bin — so run the built CLI directly.
  dogfood:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: fetch the base branch so --base resolves
        run: git fetch origin "${{ github.base_ref }}"
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: assay this PR with the code under review
        run: node dist/cli.js check --base "origin/${{ github.base_ref }}" --head HEAD --json
  # waiver-stamp (producer, unprivileged): computes the waiver verdict over this
  # PR's base..head range and publishes it as the `waiver-stamp` check plus a
  # `waiver-stamp-report` artifact. It never holds a write token — the privileged
  # half that can post an APPROVE is .github/workflows/waiver-stamp-review.yml,
  # which consumes that artifact. Setup: waiver-stamp docs/auto-approval-setup.md
  # (this job is step 1 of that checklist).
  #
  # SHA-pinned like every other third-party action here (guarded by
  # src/workflow-pins.test.ts): waiver-stamp's `v*` tags are immutable, but this
  # repo's policy is hash-pin-only, so we pin the SHA and keep the trailing
  # `# v1.12.0` in sync for Dependabot to bump.
  waiver-stamp:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # waiver-stamp walks the full base..head commit range
          persist-credentials: false
      - name: waiver-stamp
        uses: jsalvata/waiver-stamp/.github/actions/waiver-stamp@edd421447bdb4bf375e68696e7480f3be433f1d1 # v1.12.0
  # Release runs only AFTER test + integration pass, and only on a push to main
  # — never in parallel with the tests. Publishing to npm uses OIDC trusted
  # publishing (no NPM_TOKEN); configure the trusted publisher for this package
  # on npmjs.com pointing at this workflow file (see docs/RELEASING.md).
  release:
    needs: [test, integration]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    # Mint the release identity from a dedicated App (RELEASE_APP_*, scoped to this
    # environment, which is pinned to main) instead of GITHUB_TOKEN. semantic-release's
    # @semantic-release/git pushes the `chore(release):` commit + tag straight to main;
    # GITHUB_TOKEN (github-actions[bot]) cannot be a ruleset bypass actor, so its push is
    # rejected by main's protection. The App IS a bypass actor on the `main` ruleset, so
    # its push goes through. See docs/RELEASING.md.
    environment: semantic-release
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Hash-pinned like every third-party action here (same SHA as lockfile-assay.yml).
      - uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        id: release-app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - name: Release
        run: pnpm exec semantic-release
        env:
          # The dedicated App's token — bypasses main's protection to push the release commit.
          GITHUB_TOKEN: ${{ steps.release-app-token.outputs.token }}
