# lockfile-assay — INTERIM dogfood form of the anchored check.
#
# The adopted design (spec §6/§8) anchors on pull_request_target and carries
# the memo in the App's own check runs — see examples/assay.yml and
# docs/setup-github-app.md. That backend is not implemented yet, so this
# workflow still runs the superseded interim form: pull_request trigger,
# reviewer-gated environment, branch-store memo. Migration plan:
# docs/external-app-direction.md.
#
# NOTE (dogfooding): the reference workflow runs the PUBLISHED package. This
# repo is lockfile-assay itself, so — like the Dogfood step in ci.yml — we
# build and run the CLI under review (`node dist/cli.js`) instead.
name: lockfile-assay
on:
  pull_request:
jobs:
  assay:
    runs-on: ubuntu-latest
    # SECURITY (interim form): this job mints a memo-writer token from the App
    # secret, and a required status check does NOT stop a PR from minting it.
    # ASSAY_APP_ID / ASSAY_APP_PRIVATE_KEY live on the `memo-write` GitHub
    # Environment, gated by required reviewers, so the token is minted only
    # after a human approves the run.
    environment: memo-write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/create-github-app-token@v1
        id: memo-token
        with:
          app-id: ${{ secrets.ASSAY_APP_ID }}
          private-key: ${{ secrets.ASSAY_APP_PRIVATE_KEY }}
      - name: lockfile-assay
        env:
          LOCKFILE_ASSAY_TOKEN: ${{ steps.memo-token.outputs.token }}
        run: |
          node dist/cli.js check \
            --base "origin/${{ github.base_ref }}" --head HEAD \
            --memo-write --json
