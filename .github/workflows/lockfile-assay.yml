# Reference anchored workflow for lockfile-assay (spec §6 / §8).
#
# === SECURITY-CRITICAL FILE — review every edit with care. ===================
# This workflow runs with secrets while the PR controls the content under test;
# a careless edit reopens code-execution-with-secrets. Read the guide before
# changing it:
# https://github.com/jsalvata/lockfile-assay/blob/main/docs/setup-github-app.md
# =============================================================================
#
# ANCHOR: this triggers on `pull_request_target`, so the workflow definition
# that runs is the BASE branch's — server-enforced; a PR cannot edit its own
# gate, and a pull_request_target workflow added by a PR does not trigger. The
# App secrets live on a branch-restricted environment only base-context runs
# can read, and branch protection pins the required check to the App's
# identity. Setup: docs/setup-github-app.md.
#
# SECURITY DISCIPLINE: a pull_request_target job runs with secrets while the
# PR controls the repository content under test. The assay treats that content
# as inert data (spec §3: --ignore-scripts, no pnpmfile, nothing executes),
# and this job must preserve that property — check out the BASE (the default
# here), fetch head commits as git data only, run the published pinned assay,
# and never execute anything from the head tree (no pnpm install of the repo
# under test, no `uses: ./`, no head checkout).
#
# Private-registry note: the derivation strips `npm_config_*` env vars so
# ambient env can't override the staged `.npmrc` (spec §6). Supply private
# registry auth via the runner's ~/.npmrc FILE, not `npm_config_*` env vars —
# add a step that writes ~/.npmrc before the check runs.
#
# THIRD-PARTY ACTIONS ARE PINNED BY COMMIT SHA, NOT BY TAG. A git tag is
# mutable: whoever can push tags in the action's repo can repoint `v4` at new
# code, which this job would then run WITH THE APP'S CREDENTIALS. That is not
# hypothetical here — `create-github-app-token` MINTS the token whose identity
# the whole anchor rests on (spec §6: "only the creating App can update its
# runs"). Mint that token and you ARE the creating App, and assay verdicts
# become forgeable. A SHA is the content hash of a commit and cannot be moved.
# The trailing `# vX.Y.Z` comment is what Dependabot reads to offer bumps —
# keep it in sync with the SHA. Guarded by src/workflow-pins.test.ts.
name: lockfile-assay
on:
  pull_request_target:
jobs:
  assay:
    runs-on: ubuntu-latest
    environment: lockfile-assay
    steps:
      # base branch — never the PR head
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: fetch head as git data
        run: git fetch origin "pull/${{ github.event.pull_request.number }}/head"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        id: app-token
        with:
          app-id: ${{ secrets.ASSAY_APP_ID }}
          private-key: ${{ secrets.ASSAY_APP_PRIVATE_KEY }}
      # The one ref that is a TAG, not a SHA — deliberately. This line is
      # rewritten on every release (scripts/set-release-version.sh, run during
      # semantic-release's `prepare`), which happens BEFORE the release commit
      # exists — so it cannot know its own future SHA. A SHA pin here would be
      # unmaintainable by construction. The tag is instead held immutable by a
      # repository ruleset on `v*` (update, deletion and non-fast-forward all
      # restricted, no bypass actors) — server-enforced, the same class of fact
      # the rest of the anchor rests on. And what actually EXECUTES is pinned a
      # second time inside action.yml, which installs an exact CLI version from
      # npm. See docs/RELEASING.md.
      - uses: jsalvata/lockfile-assay@v1.0.2   # pin to a published release; bump on upgrade
        with:
          base: origin/${{ github.base_ref }}
          head: ${{ github.event.pull_request.head.sha }}
          pr: ${{ github.event.pull_request.number }}
          app-id: ${{ secrets.ASSAY_APP_ID }}
          app-token: ${{ steps.app-token.outputs.token }}
