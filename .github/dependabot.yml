# SHA-pinning actions trades one risk for another: the pins are immutable, but
# they also freeze — a frozen pin silently keeps running code with known CVEs.
# Dependabot is what makes the trade safe. It reads the trailing `# vX.Y.Z`
# comment beside each SHA, and opens a PR that bumps BOTH the SHA and the
# comment, so upgrades stay reviewable diffs rather than invisible tag moves.
#
# `directory: /` is correct for github-actions: Dependabot scans
# .github/workflows/ from the repo root. It does NOT scan examples/, so the
# reference workflow's pins are bumped by hand — keep them in step with
# .github/workflows/lockfile-assay.yml, which is a byte-identical copy.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      # `chore`, NOT `fix`. semantic-release's commit-analyzer cuts a patch
      # release for every `fix:` that lands on main — and a CI action bump
      # changes nothing about the published CLI, so releasing one would churn
      # the version (and rewrite action.yml + examples/) to ship identical code.
      # `chore` is release-neutral and is what this repo already uses for
      # release commits, so commitlint accepts it.
      prefix: chore
    groups:
      # one PR for routine action bumps rather than four; a major bump still
      # lands on its own, where it belongs.
      actions-minor:
        patterns: ['*']
        update-types: [minor, patch]
