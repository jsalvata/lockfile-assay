# Reference anchored workflow for lockfile-assay (spec §6 / §8).
#
# === SECURITY-CRITICAL FILE — review every edit with care. ===================
# This workflow runs with secrets while the PR controls the content under test;
# a careless edit reopens code-execution-with-secrets. Read the guide before
# changing it:
# https://github.com/jsalvata/lockfile-assay/blob/main/docs/setup-github-app.md
# =============================================================================
#
# ANCHOR: this triggers on `pull_request_target`, so the workflow definition
# that runs is the BASE branch's — server-enforced; a PR cannot edit its own
# gate, and a pull_request_target workflow added by a PR does not trigger. The
# App secrets live on a branch-restricted environment only base-context runs
# can read, and branch protection pins the required check to the App's
# identity. Setup: docs/setup-github-app.md.
#
# SECURITY DISCIPLINE: a pull_request_target job runs with secrets while the
# PR controls the repository content under test. The assay treats that content
# as inert data (spec §3: --ignore-scripts, no pnpmfile, nothing executes),
# and this job must preserve that property — check out the BASE (the default
# here), fetch head commits as git data only, run the published pinned assay,
# and never execute anything from the head tree (no pnpm install of the repo
# under test, no `uses: ./`, no head checkout).
#
# Private-registry note: the derivation strips `npm_config_*` env vars so
# ambient env can't override the staged `.npmrc` (spec §6). Supply private
# registry auth via the runner's ~/.npmrc FILE, not `npm_config_*` env vars —
# add a step that writes ~/.npmrc before the check runs.
#
# Third-party actions are pinned by commit SHA, not by tag: a tag is mutable, and
# this job runs with the App's credentials. Bump them by the trailing `# vX.Y.Z`
# (Dependabot reads it). Why it matters: spec §6, "The workflow's own supply chain".
# (The lone exception — our own `jsalvata/lockfile-assay@v1.0.2` tag — is explained
# and zizmor-suppressed at its `uses:` line below.)
#
# zizmor-clean: adopters who lint workflows with zizmor get a green run. Genuine
# tightenings (scoped GITHUB_TOKEN + scoped App token) are applied; the deliberate
# design choices (pull_request_target, our own tag) carry inline `zizmor: ignore`
# comments with reasons at the offending line.
name: lockfile-assay
on:
  # zizmor flags pull_request_target as a dangerous trigger — it is, in general.
  # Here it is the whole point (see the ANCHOR note above), so suppress it.
  pull_request_target: # zizmor: ignore[dangerous-triggers]
jobs:
  assay:
    runs-on: ubuntu-latest
    environment: lockfile-assay
    # Least privilege for the workflow's own GITHUB_TOKEN: it only checks out the
    # base and fetches head commits as git data. The App token (scoped below)
    # does the privileged work. This also clears zizmor's excessive-permissions.
    permissions:
      contents: read
    steps:
      # base branch — never the PR head. persist-credentials stays on (the default):
      # the fetch step below reuses the token to read head commits from a private
      # repo, and this job uploads no artifacts, so zizmor's artipacked does not apply.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # zizmor: ignore[artipacked]
      - name: fetch head as git data
        run: git fetch origin "pull/${{ github.event.pull_request.number }}/head"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        id: app-token
        with:
          app-id: ${{ secrets.ASSAY_APP_ID }}
          private-key: ${{ secrets.ASSAY_APP_PRIVATE_KEY }}
          # Scope the App token to exactly what the assay needs — it posts its
          # verdict as a check run (action.yml: "Checks: write") and nothing more.
          # This also clears zizmor's github-app (blanket-permissions) finding.
          permission-checks: write
      # A tag, not a SHA — deliberate and safe: our `v*` tags are immutable (a
      # ruleset restricts update and deletion), and action.yml pins the exact CLI
      # version it installs. Prefer a SHA anyway? `@<commit-sha>` works here too.
      - uses: jsalvata/lockfile-assay@v1.0.3 # zizmor: ignore[unpinned-uses] immutable v* tag (ruleset); action.yml pins the CLI — see note above
        with:
          base: origin/${{ github.base_ref }}
          head: ${{ github.event.pull_request.head.sha }}
          pr: ${{ github.event.pull_request.number }}
          app-id: ${{ secrets.ASSAY_APP_ID }}
          app-token: ${{ steps.app-token.outputs.token }}
