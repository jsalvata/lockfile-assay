# SECURITY-CRITICAL: this action runs the derivation with your App token, but it
# does NOT set the trigger or check out code — so it cannot enforce the anchor by
# itself. Safe use requires the ANCHORED calling workflow: a pull_request_target
# trigger, base checkout (never the PR head), and the token from a branch-
# restricted environment. A naive pull_request wiring reopens
# code-execution-with-secrets. See the guide before using or editing:
# https://github.com/jsalvata/lockfile-assay/blob/main/docs/setup-github-app.md
name: lockfile-assay
description: >-
  Verify the committed lockfile derives honestly from reviewable inputs, post
  the verdict as the App's check run, and memoise passing derivations
  (anchored form — spec §8). Safe only from an anchored pull_request_target
  workflow — see docs/setup-github-app.md.
inputs:
  base:
    # NB: keep the github context OUT of these descriptions. GitHub evaluates
    # placeholder expressions when the action LOADS, where that context is
    # unavailable, so one here breaks every `uses:` of this action (a
    # regression test guards it). The exact workflow expressions live in the
    # caller: examples/lockfile-assay.yml.
    description: Base ref (the PR merge-base), e.g. the origin merge-base; see examples/lockfile-assay.yml.
    required: true
  head:
    description: Head ref to check — the PR head SHA; see examples/lockfile-assay.yml.
    required: false
    default: HEAD
  pr:
    description: PR number, for the memo consult; see examples/lockfile-assay.yml.
    required: true
  app-id:
    description: The dedicated App's id, for the consult identity filter.
    required: true
  app-token:
    description: >-
      GitHub App installation token with Checks: write, from the dedicated App
      (actions/create-github-app-token). Passed to the CLI as
      LOCKFILE_ASSAY_TOKEN. See docs/setup-github-app.md.
    required: true
runs:
  using: composite
  steps:
    - name: lockfile-assay
      shell: bash
      env:
        LOCKFILE_ASSAY_TOKEN: ${{ inputs.app-token }}
        LOCKFILE_ASSAY_APP_ID: ${{ inputs.app-id }}
      run: |
        set -euo pipefail
        # PIN — do not unpin. scripts/set-release-version.sh rewrites this line on
        # every release, so `uses: jsalvata/lockfile-assay@vX.Y.Z` runs EXACTLY
        # lockfile-assay@X.Y.Z. Installing the package WITHOUT a version (as this
        # action originally did) resolves to whatever is `latest` on npm — so
        # pinning the action tag would NOT pin the code that executes, the exact
        # opposite of what this tool exists for. Guarded by src/action-yml.test.ts.
        VERSION="1.1.1" # x-release-version
        # Install globally and invoke via PATH, not via npx: when the assay runs on
        # its OWN repo (dogfooding), npx resolves the bare package name against the
        # local package (bin -> dist/cli.js, unbuilt in a fresh checkout) and dies
        # with exit 127. A global bin on PATH has no such collision.
        npm install -g "lockfile-assay@${VERSION}" >/dev/null
        lockfile-assay check \
          --base "${{ inputs.base }}" --head "${{ inputs.head }}" \
          --pr "${{ inputs.pr }}" \
          --memo-write --json
